<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flash Card Math Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { overflow: hidden; height: 100%; }
  img, svg, a, button { -webkit-user-drag: none; user-drag: none; draggable: false; }
  * { -webkit-user-select: none; user-select: none; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: #eee; overflow: hidden;
    touch-action: manipulation;
    transition: background 0.6s;
  }

  .hidden { display: none !important; }

  /* Themes — soft, low-saturation, eye-friendly palettes */
  body.theme-default { background: linear-gradient(145deg, #3b3d54, #4a4c66, #3b3d54); }
  body.theme-space   { background: linear-gradient(145deg, #2e3a4a, #3d5068, #2e3a4a); }
  body.theme-ocean   { background: linear-gradient(145deg, #4a7a8a, #6a9aaa, #4a7a8a); }
  body.theme-jungle  { background: linear-gradient(145deg, #4a6a52, #5a7a62, #4a6a52); }
  body.theme-sunset  { background: linear-gradient(145deg, #7a6a5a, #9a8a7a, #7a6a5a); }
  body.theme-candy   { background: linear-gradient(145deg, #8a7a82, #a0909a, #8a7a82); }

  /* Card */
  .card {
    width: 100%; max-width: 600px; margin: 0.5rem;
    padding: 2rem 2rem;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
    text-align: center;
    max-height: 100vh; overflow-y: auto;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }

  #start-screen, #quiz-screen, #results-screen { width: 100%; }

  h1 {
    font-size: 1.6rem; margin-bottom: 1rem;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: -0.02em;
  }
  h2 { font-size: 1.1rem; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 0.6rem; }

  /* Config */
  .config-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .config-item { text-align: center; }
  .config-item label { display: block; font-size: 0.8rem; color: rgba(255,255,255,0.55); margin-bottom: 4px; }
  .config-item input, .config-item select {
    width: 100px; padding: 0.4rem; font-size: 0.95rem;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    background: rgba(255,255,255,0.08); color: #eee;
    text-align: center; min-height: 40px;
    transition: border-color 0.2s;
  }
  .config-item select { width: 120px; }
  .config-item input:focus, .config-item select:focus {
    outline: none; border-color: #667eea;
  }

  /* Theme selector */
  .theme-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .theme-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer; transition: transform 0.15s, border-color 0.2s;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    padding: 0; box-shadow: none; min-height: 0; font-size: 0;
    position: relative; overflow: hidden;
  }
  .theme-btn.active { border-color: #fff; transform: scale(1.15); }
  .theme-btn[data-theme="default"] { background: linear-gradient(135deg, #4a4c66, #3b3d54) !important; }
  .theme-btn[data-theme="space"]   { background: linear-gradient(135deg, #2e3a4a, #3d5068) !important; }
  .theme-btn[data-theme="ocean"]   { background: linear-gradient(135deg, #4a7a8a, #6a9aaa) !important; }
  .theme-btn[data-theme="jungle"]  { background: linear-gradient(135deg, #4a6a52, #5a7a62) !important; }
  .theme-btn[data-theme="sunset"]  { background: linear-gradient(135deg, #7a6a5a, #9a8a7a) !important; }
  .theme-btn[data-theme="candy"]   { background: linear-gradient(135deg, #8a7a82, #a0909a) !important; }

  /* Buttons */
  button {
    padding: 0.6rem 2rem; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
    min-height: 44px; box-shadow: 0 4px 15px rgba(102,126,234,0.3);
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) { button:hover { transform: translateY(-2px); } }
  button:active { transform: translateY(0); }

  /* Music toggle */
  .music-toggle {
    position: absolute; top: 10px; right: 10px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1) !important; border: 1px solid rgba(255,255,255,0.15);
    font-size: 1.1rem; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; min-height: 0; box-shadow: none;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    z-index: 10; transition: background 0.2s;
  }
  .music-toggle:active { background: rgba(255,255,255,0.2) !important; }
  .cancel-btn {
    position: absolute; top: 10px; left: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.7rem; color: rgba(255,255,255,0.4); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; min-height: 0; box-shadow: none;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    z-index: 10; transition: background 0.2s;
  }
  .cancel-btn:active { background: rgba(255,255,255,0.15) !important; }
  .card { position: relative; }

  /* Best score badge */
  .best-score {
    font-size: 0.85rem; color: rgba(255,255,255,0.45); margin-bottom: 1rem;
  }
  .best-score span { color: #f5af19; font-weight: 600; }

  /* Timer Bar */
  .timer-bar-track {
    width: 100%; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem;
  }
  .timer-bar-fill {
    height: 100%; width: 100%; border-radius: 4px;
    transition: width 1s linear, background-color 1s linear;
    box-shadow: 0 0 8px currentColor;
  }

  /* Quiz top row */
  .quiz-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.3rem; font-size: 0.85rem; color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  /* Combo */
  .combo-display {
    font-size: 1rem; font-weight: 700; min-height: 1.6rem;
    transition: transform 0.2s;
  }
  .combo-display.pop { animation: comboPop 0.35s ease-out; }
  @keyframes comboPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .combo-fire { color: #f39c12; }
  .combo-super { color: #e74c3c; }
  .combo-ultra {
    background: linear-gradient(90deg, #f5af19, #e74c3c, #f5af19);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Character */
  .character {
    font-size: 3rem; min-height: 3.8rem; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .character.bounce { animation: charBounce 0.5s ease-out; }
  .character.shake  { animation: charShake 0.5s ease-out; }
  .character.wave   { animation: charWave 0.8s ease-in-out; }
  @keyframes charBounce {
    0% { transform: scale(1) translateY(0); }
    30% { transform: scale(1.2) translateY(-10px); }
    60% { transform: scale(0.95) translateY(2px); }
    100% { transform: scale(1) translateY(0); }
  }
  @keyframes charShake {
    0%,100% { transform: rotate(0); }
    20% { transform: rotate(-15deg); }
    40% { transform: rotate(15deg); }
    60% { transform: rotate(-10deg); }
    80% { transform: rotate(10deg); }
  }
  @keyframes charWave {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(12deg); }
    75% { transform: rotate(-12deg); }
  }

  /* Character picker */
  .char-picker { display: flex; gap: 10px; justify-content: center; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .char-pick-btn {
    width: 52px; height: 52px; border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06) !important;
    font-size: 1.8rem; cursor: pointer; transition: transform 0.15s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    padding: 0; box-shadow: none; min-height: 0;
  }
  .char-pick-btn.active { border-color: #f5af19; transform: scale(1.12); background: rgba(245,175,25,0.12) !important; }
  .char-pick-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-top: 2px; text-align: center; }

  /* Question */
  .question {
    font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0;
    min-height: 3rem; display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.04em; color: #fff;
  }

  .question-timer {
    font-size: 0.95rem; margin-bottom: 0.6rem;
    color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums;
  }

  /* Answer display */
  .answer-display {
    display: inline-block; width: 140px; min-height: 46px;
    padding: 0.5rem 0.6rem; font-size: 1.6rem; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
    background: rgba(255,255,255,0.08); color: #fff;
    letter-spacing: 0.08em; font-variant-numeric: tabular-nums;
  }

  /* Correct answer flash */
  .correct-answer-display {
    font-size: 1.1rem; min-height: 1.6rem; margin-top: 0.3rem;
    color: #e74c3c; font-weight: 600;
  }

  /* Number Pad */
  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; max-width: 300px; margin: 0.8rem auto 0;
  }
  .numpad-btn {
    padding: 0.5rem; font-size: 1.6rem; font-weight: 600; min-height: 56px;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    background: rgba(255,255,255,0.08); color: #fff; cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    box-shadow: none; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  @media (hover: hover) {
    .numpad-btn:hover { background: rgba(255,255,255,0.15); }
  }
  .numpad-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.22); }
  .numpad-btn.clear { font-size: 1.1rem; background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.3); }
  .numpad-btn.clear:active { background: rgba(231,76,60,0.4); }
  .numpad-btn.submit { font-size: 1.1rem; background: linear-gradient(135deg,#667eea,#764ba2); border-color: transparent; }
  .numpad-btn.submit:active { background: linear-gradient(135deg,#5a6fd6,#6a4296); }

  /* Feedback Overlay */
  .quiz-container { position: relative; }
  .feedback-overlay {
    position: absolute; inset: -8px; border-radius: 16px;
    pointer-events: none; opacity: 0;
  }
  .feedback-correct { animation: correctPulse 0.7s ease-out forwards; }
  .feedback-incorrect { animation: incorrectShake 0.7s ease-out forwards; }
  @keyframes correctPulse {
    0%   { opacity: 0; background: rgba(39,174,96,0.3); transform: scale(1); }
    30%  { opacity: 1; background: rgba(39,174,96,0.4); transform: scale(1.02); }
    100% { opacity: 0; background: rgba(39,174,96,0); transform: scale(1); }
  }
  @keyframes incorrectShake {
    0%   { opacity: 1; background: rgba(231,76,60,0.3); transform: translateX(0); }
    15%  { background: rgba(231,76,60,0.4); transform: translateX(-8px); }
    30%  { transform: translateX(8px); }
    45%  { transform: translateX(-6px); }
    60%  { transform: translateX(6px); }
    75%  { transform: translateX(-3px); }
    100% { opacity: 0; background: rgba(231,76,60,0); transform: translateX(0); }
  }

  /* Live badge bar */
  .live-badges {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    min-height: 2.2rem; margin-bottom: 0.3rem;
  }
  .live-badge {
    font-size: 1.4rem; width: 2rem; height: 2rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; background: rgba(255,255,255,0.06);
    opacity: 0.2; filter: grayscale(1);
    transition: opacity 0.3s, filter 0.3s;
  }
  .live-badge.earned {
    opacity: 1; filter: none;
    animation: badgePop 0.6s cubic-bezier(0.17, 0.67, 0.29, 1.3);
  }
  @keyframes badgePop {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    50%  { transform: scale(1.6) rotate(5deg); }
    70%  { transform: scale(0.85) rotate(-3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Badge celebration overlay */
  .badge-celebration {
    position: fixed; inset: 0; pointer-events: none; z-index: 200;
  }
  .badge-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 199;
    animation: goldenGlow 1.5s ease-out forwards;
  }
  @keyframes goldenGlow {
    0%   { background: radial-gradient(circle, rgba(245,175,25,0.4) 0%, transparent 60%); opacity: 1; }
    50%  { background: radial-gradient(circle, rgba(245,175,25,0.2) 0%, transparent 70%); opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Confetti piece */
  .confetti {
    position: fixed; pointer-events: none; z-index: 201;
    width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall var(--fall-duration, 2s) cubic-bezier(0.25, 0, 0.5, 1) forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
    25%  { transform: translateY(25vh) rotate(180deg) translateX(var(--drift, 30px)) scale(1); }
    50%  { transform: translateY(50vh) rotate(360deg) translateX(calc(var(--drift, 30px) * -0.5)) scale(0.9); }
    75%  { opacity: 0.7; transform: translateY(75vh) rotate(540deg) translateX(var(--drift, 30px)) scale(0.7); }
    100% { opacity: 0; transform: translateY(105vh) rotate(720deg) scale(0.3); }
  }

  /* Badge name popup */
  .badge-name-popup {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-size: 1.3rem; font-weight: 700; color: #f5af19;
    text-shadow: 0 0 20px rgba(245,175,25,0.6), 0 2px 10px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 202; white-space: nowrap;
    animation: namePopup 2s ease-out forwards;
  }
  @keyframes namePopup {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    30%  { transform: translate(-50%, -50%) scale(1); }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(0.9); }
  }

  /* Stars floating animation */
  .star-float {
    position: fixed; pointer-events: none; font-size: 1.5rem;
    animation: starRise 1s ease-out forwards; z-index: 100;
  }
  @keyframes starRise {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* Results */
  .results-stats { margin: 1rem 0; font-size: 1rem; line-height: 2; color: rgba(255,255,255,0.7); }
  .results-stats .big {
    font-size: 2.5rem; font-weight: 700;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .new-best {
    display: inline-block; padding: 2px 10px; border-radius: 6px;
    background: linear-gradient(135deg, #f5af19, #f12711);
    color: #fff; font-size: 0.8rem; font-weight: 700;
    animation: bestPulse 1s ease-in-out infinite alternate;
  }
  @keyframes bestPulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }

  /* Trophies */
  .trophies { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 0.8rem 0; }
  .trophy {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 10px; border-radius: 10px; background: rgba(255,255,255,0.05);
    font-size: 0.7rem; color: rgba(255,255,255,0.5); min-width: 70px;
  }
  .trophy .icon { font-size: 1.5rem; }
  .trophy.earned { background: rgba(245,175,25,0.15); color: #f5af19; }


  /* Weakness */
  .weakness-section { margin-top: 1rem; text-align: left; }
  .weakness-list { list-style: none; padding: 0; }
  .weakness-item {
    display: flex; align-items: center; padding: 0.4rem 0.6rem;
    margin-bottom: 4px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 0.9rem;
  }
  .weakness-item .question-text { font-weight: 600; color: #fff; min-width: 70px; }
  .weakness-item .miss-count { color: #e74c3c; font-weight: 600; font-size: 0.8rem; white-space: nowrap; }
  .weakness-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 0 8px; overflow: hidden; }
  .weakness-bar-fill { height: 100%; background: linear-gradient(90deg,#e74c3c,#c0392b); border-radius: 3px; }
  .no-weakness { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem; padding: 0.8rem 0; }

  /* Shape display */
  .shape-display {
    display: flex; align-items: center; justify-content: center;
    margin: 0.5rem 0;
  }
  .shape-display svg {
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  /* Multiple choice buttons */
  .choices {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; max-width: 320px; margin: 0.8rem auto 0;
  }
  .choice-btn {
    padding: 0.7rem 0.5rem; font-size: 1.1rem; font-weight: 600; min-height: 52px;
    border: 2px solid rgba(255,255,255,0.15); border-radius: 14px;
    background: rgba(255,255,255,0.08) !important; color: #fff; cursor: pointer;
    transition: background 0.12s, transform 0.1s, border-color 0.2s;
    box-shadow: none; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  @media (hover: hover) {
    .choice-btn:hover { background: rgba(255,255,255,0.15) !important; }
  }
  .choice-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2) !important; }
  .choice-btn.correct-choice {
    border-color: #27ae60 !important; background: rgba(39,174,96,0.2) !important;
  }
  .choice-btn.wrong-choice {
    border-color: #e74c3c !important; background: rgba(231,76,60,0.2) !important;
  }

  /* Settings gear */
  .settings-btn {
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.12);
    font-size: 1.1rem; color: rgba(255,255,255,0.5); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; min-height: 0; box-shadow: none;
    touch-action: manipulation; z-index: 10;
  }
  .settings-back-btn {
    padding: 0.4rem 1.2rem; font-size: 0.85rem;
    background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5); box-shadow: none; border-radius: 8px;
    margin-top: 1rem;
  }

  /* Level up */
  .level-up-msg {
    display: inline-block; padding: 4px 14px; border-radius: 8px; margin: 4px 0;
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: #fff; font-size: 1rem; font-weight: 700;
    animation: bestPulse 1s ease-in-out infinite alternate;
  }

  /* Parent Dashboard */
  .dashboard-btn {
    margin-top: 0.8rem; padding: 0.4rem 1.2rem; font-size: 0.8rem;
    background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5); box-shadow: none; border-radius: 8px;
  }
  .dash-back-btn {
    padding: 0.4rem 1.2rem; font-size: 0.85rem;
    background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5); box-shadow: none; border-radius: 8px;
    margin-top: 1rem;
  }
  .dash-section { margin-bottom: 1.2rem; text-align: left; }
  .dash-section h2 {
    font-size: 0.95rem; color: rgba(255,255,255,0.55); text-align: center;
    margin-bottom: 0.5rem; font-weight: 500;
  }
  .dash-summary {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-bottom: 1rem;
  }
  .dash-stat {
    padding: 0.6rem 0.4rem; border-radius: 10px;
    background: rgba(255,255,255,0.05); text-align: center;
  }
  .dash-stat .val {
    font-size: 1.4rem; font-weight: 700; color: #fff;
  }
  .dash-stat .lbl {

<script>
  const $ = id => document.getElementById(id);

  // Persistent data
  const saved = JSON.parse(localStorage.getItem('flashmath') || '{}');
  if (!saved.bestScore) saved.bestScore = {};
  if (!saved.theme) saved.theme = 'default';
  if (!saved.gamesPlayed) saved.gamesPlayed = 0;
  if (!saved.gameHistory) saved.gameHistory = [];
  if (!saved.lastPlayer) saved.lastPlayer = '';
  if (!saved.playerLevels) saved.playerLevels = {}; // { "name": { math: 3, words: 2 } }
  if (!saved.playerPassedTopics) saved.playerPassedTopics = {}; // { "name": { "math-1": ["add-5"], ... } }
  const PASS_THRESHOLD = 95; // % accuracy to unlock next level
  function persist() { localStorage.setItem('flashmath', JSON.stringify(saved)); }

  function getPlayerMaxLevel(player, category) {
    const pl = saved.playerLevels[player];
    if (!pl) return 1;
    return pl[category] || 1;
  }
  function setPlayerMaxLevel(player, category, level) {
    if (!saved.playerLevels[player]) saved.playerLevels[player] = {};
    saved.playerLevels[player][category] = level;
    persist();
  }
  function getPassedTopics(player, category, level) {
    const key = category + '-' + level;
    if (!saved.playerPassedTopics[player]) return [];
    return saved.playerPassedTopics[player][key] || [];
  }
  function markTopicPassed(player, category, level, topic) {
    if (!saved.playerPassedTopics[player]) saved.playerPassedTopics[player] = {};
    const key = category + '-' + level;
    if (!saved.playerPassedTopics[player][key]) saved.playerPassedTopics[player][key] = [];
    if (!saved.playerPassedTopics[player][key].includes(topic)) {
      saved.playerPassedTopics[player][key].push(topic);
    }
    persist();
  }
  function allTopicsPassed(player, category, level) {
    const topicMap = category === 'words' ? WORD_TOPICS : GRADE_TOPICS;
    const topics = topicMap[level];
    if (!topics) return false;
    const passed = getPassedTopics(player, category, level);
    return topics.every(t => passed.includes(t.value));
  }

  const state = {
    totalTime: 60, questionTime: 5, grade: 2,
    totalRemaining: 0, questionRemaining: 0,
    totalInterval: null, questionInterval: null,
    correct: 0, incorrect: 0, combo: 0, maxCombo: 0, stars: 0,
    currentAnswer: null, currentQuestion: null,
    isAcceptingInput: true, gameOver: false,
    history: [], questionCount: 0,
    mode: 'math', questionType: 'math',
    // Character
    charIdle: '&#128049;', charHappy: '&#128571;', charSad: '&#128568;',
  };

  // Audio
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    const o = audioCtx.createOscillator();
    o.connect(g);
    if (type === 'correct') {
      // Clear bell "ding~ ding~" — two pure tones with harmonics
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.15, now + 0.2);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
      o.type = 'sine';
      o.frequency.setValueAtTime(1047, now);       // C6 - high clear bell
      o.frequency.setValueAtTime(1319, now + 0.2); // E6 - higher bell
      o.start(now); o.stop(now + 0.7);
      // Add a soft harmonic overtone for bell shimmer
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      g2.connect(audioCtx.destination);
      g2.gain.setValueAtTime(0.06, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o2.type = 'sine';
      o2.frequency.setValueAtTime(2094, now);      // C7 overtone
      o2.frequency.setValueAtTime(2637, now + 0.2);// E7 overtone
      o2.connect(g2);
      o2.start(now); o2.stop(now + 0.5);
    } else if (type === 'incorrect') {
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      o.type = 'square';
      o.frequency.setValueAtTime(180, now);
      o.frequency.linearRampToValueAtTime(120, now + 0.35);
      o.start(now); o.stop(now + 0.35);
    } else if (type === 'timeout') {
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      o.type = 'triangle';
      o.frequency.setValueAtTime(392, now);
      o.frequency.setValueAtTime(294, now + 0.15);
      o.start(now); o.stop(now + 0.5);
    } else if (type === 'gameover') {
      g.gain.setValueAtTime(0.2, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      o.type = 'sine';
      o.frequency.setValueAtTime(440, now);
      o.frequency.setValueAtTime(349, now + 0.2);
      o.frequency.setValueAtTime(262, now + 0.4);
      o.start(now); o.stop(now + 0.8);
    } else if (type === 'combo') {
      g.gain.setValueAtTime(0.12, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, now);
      o.start(now); o.stop(now + 0.2);
    } else if (type === 'badge') {
      // Grand fanfare — ascending arpeggio with harmonics and shimmer
      g.gain.setValueAtTime(0.22, now);
      g.gain.setValueAtTime(0.25, now + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
      o.type = 'sine';
      o.frequency.setValueAtTime(523, now);        // C5
      o.frequency.setValueAtTime(659, now + 0.15); // E5
      o.frequency.setValueAtTime(784, now + 0.3);  // G5
      o.frequency.setValueAtTime(1047, now + 0.5); // C6
      o.frequency.setValueAtTime(1319, now + 0.7); // E6
      o.start(now); o.stop(now + 1.4);
      // Harmony layer
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      g2.connect(audioCtx.destination);
      g2.gain.setValueAtTime(0.1, now + 0.15);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      o2.type = 'sine';
      o2.frequency.setValueAtTime(784, now + 0.15); // G5
      o2.frequency.setValueAtTime(988, now + 0.3);  // B5
      o2.frequency.setValueAtTime(1175, now + 0.5); // D6
      o2.frequency.setValueAtTime(1568, now + 0.7); // G6
      o2.connect(g2); o2.start(now + 0.15); o2.stop(now + 1.2);
      // Shimmer top layer
      const o3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      g3.connect(audioCtx.destination);
      g3.gain.setValueAtTime(0.05, now + 0.5);
      g3.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
      o3.type = 'sine';
      o3.frequency.setValueAtTime(2093, now + 0.5); // C7
      o3.frequency.setValueAtTime(2637, now + 0.7); // E7
      o3.connect(g3); o3.start(now + 0.5); o3.stop(now + 1.4);
    } else { o.start(now); o.stop(now); }
  }

  // Background Music
  let bgmPlaying = false;
  let bgmTimeout = null;
  let bgmMuted = false;
  const bgmGain = audioCtx.createGain();
  bgmGain.connect(audioCtx.destination);
  bgmGain.gain.value = 0.07;

  // Cute melody notes (pentatonic scale, happy feel)
  const melody = [
    // Bar 1
    { note: 523, dur: 0.25 }, // C5
    { note: 587, dur: 0.25 }, // D5
    { note: 659, dur: 0.5  }, // E5
    { note: 784, dur: 0.25 }, // G5
    { note: 659, dur: 0.25 }, // E5
    { note: 523, dur: 0.5  }, // C5
    // Bar 2
    { note: 587, dur: 0.25 }, // D5
    { note: 659, dur: 0.25 }, // E5
    { note: 784, dur: 0.5  }, // G5
    { note: 880, dur: 0.25 }, // A5
    { note: 784, dur: 0.25 }, // G5
    { note: 659, dur: 0.5  }, // E5
    // Bar 3
    { note: 784, dur: 0.25 }, // G5
    { note: 659, dur: 0.25 }, // E5
    { note: 587, dur: 0.5  }, // D5
    { note: 523, dur: 0.25 }, // C5
    { note: 587, dur: 0.25 }, // D5
    { note: 659, dur: 0.5  }, // E5
    // Bar 4
    { note: 523, dur: 0.25 }, // C5
    { note: 440, dur: 0.25 }, // A4
    { note: 523, dur: 0.75 }, // C5
    { note: 0,   dur: 0.75 }, // rest
  ];

  // Bass line
  const bass = [
    { note: 262, dur: 1.0 }, // C4
    { note: 262, dur: 1.0 },
    { note: 196, dur: 1.0 }, // G3
    { note: 220, dur: 1.0 }, // A3
    { note: 262, dur: 1.0 }, // C4
    { note: 196, dur: 1.0 }, // G3
    { note: 220, dur: 1.0 }, // A3
    { note: 262, dur: 1.0 }, // C4
  ];

  function playBgmLoop() {
    if (!bgmPlaying) return;
    const now = audioCtx.currentTime;
    let t = now + 0.05;

    // Melody
    melody.forEach(n => {
      if (n.note > 0) {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = n.note;
        env.gain.setValueAtTime(0.9, t);
        env.gain.exponentialRampToValueAtTime(0.001, t + n.dur * 0.9);
        osc.connect(env);
        env.connect(bgmGain);
        osc.start(t);
        osc.stop(t + n.dur);
      }
      t += n.dur;
    });

    // Bass
    const loopLen = t - (now + 0.05);
    let tb = now + 0.05;
    bass.forEach(n => {
      if (n.note > 0) {
        const osc = audioCtx.createOscillator();
        const env = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = n.note;
        env.gain.setValueAtTime(0.5, tb);
        env.gain.exponentialRampToValueAtTime(0.001, tb + n.dur * 0.85);
        osc.connect(env);
        env.connect(bgmGain);
        osc.start(tb);
        osc.stop(tb + n.dur);
      }
      tb += n.dur;
    });

    // Schedule next loop
    bgmTimeout = setTimeout(() => playBgmLoop(), loopLen * 1000 - 50);
  }

  function startBgm() {
    if (bgmMuted) return;
    bgmPlaying = true;
    bgmGain.gain.value = 0.07;
    playBgmLoop();
  }

  function stopBgm() {
    bgmPlaying = false;
    if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
  }

  function toggleBgm() {
    bgmMuted = !bgmMuted;
    $('music-toggle').textContent = bgmMuted ? '\uD83D\uDD07' : '\uD83C\uDFB5';
    if (bgmMuted) { stopBgm(); }
    else { startBgm(); }
  }

  $('music-toggle').addEventListener('click', toggleBgm);

  // Theme
  function applyTheme(name) {
    document.body.className = 'theme-' + name;
    document.querySelectorAll('.theme-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.theme === name);
    });
  }
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.addEventListener('click', () => {
      saved.theme = b.dataset.theme;
      persist();
      applyTheme(saved.theme);
    });
  });

  // Character picker
  document.querySelectorAll('.char-pick-btn').forEach(b => {
    b.addEventListener('click', () => {

  function showScreen(id) {

  // Question generators by topic
  function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  const TOPIC_GENERATORS = {
    // === Level 1 (old 1-2) ===
    'add-10': () => {
      const a = rnd(0, 10), b = rnd(0, 10 - a);
      return { text: `${a} + ${b} = ?`, answer: a + b, a, b, op: '+' };
    },
    'sub-10': () => {
      const big = rnd(1, 10), small = rnd(0, big);
      return { text: `${big} \u2212 ${small} = ?`, answer: big - small, a: big, b: small, op: '\u2212' };
    },
    // === Level 2 (old 3-4) ===
    'add-100': () => {
      const a = rnd(1, 99), b = rnd(1, 100 - a);
      return { text: `${a} + ${b} = ?`, answer: a + b, a, b, op: '+' };
    },
    'sub-100': () => {
      const big = rnd(10, 99), small = rnd(1, big);
      return { text: `${big} \u2212 ${small} = ?`, answer: big - small, a: big, b: small, op: '\u2212' };
    },
    // === Level 3 (old 5-6) ===
    'mul-9': () => {
      const a = rnd(2, 9), b = rnd(2, 9);
      return { text: `${a} \u00D7 ${b} = ?`, answer: a * b, a, b, op: '\u00D7' };
    },
    'div-basic': () => {
      const a = rnd(2, 9), b = rnd(1, 9), product = a * b;
      return { text: `${product} \u00F7 ${a} = ?`, answer: b, a: product, b: a, op: '\u00F7' };
    },
    // === Level 4 (old 7-8) ===
    'mul-12': () => {
      const a = rnd(2, 12), b = rnd(2, 12);
      return { text: `${a} \u00D7 ${b} = ?`, answer: a * b, a, b, op: '\u00D7' };
    },
    'div-12': () => {
      const a = rnd(2, 12), b = rnd(2, 12), product = a * b;
      return { text: `${product} \u00F7 ${a} = ?`, answer: b, a: product, b: a, op: '\u00F7' };
    },
    'fractions': () => {
      const denom = [2, 4, 5, 10][rnd(0, 3)];
      const numer = rnd(1, denom - 1);
      const whole = denom * rnd(1, 5);
      const answer = (numer / denom) * whole;
      return { text: `${numer}/${denom} of ${whole} = ?`, answer, a: numer, b: whole, op: 'frac' };
    },
    'exponents': () => {
      const a = rnd(2, 9), exp = rnd(2, 3);
      const answer = Math.pow(a, exp);
      const sup = exp === 2 ? '\u00B2' : '\u00B3';
      return { text: `${a}${sup} = ?`, answer, a, b: exp, op: '^' };
    },
    // === Level 5 (old 9-10) ===
    'negative': () => {
      const a = rnd(1, 50), b = rnd(1, 50);
      return { text: `${a} \u2212 ${b} = ?`, answer: a - b, a, b, op: '\u2212' };
    },
    'order-ops': () => {
      if (Math.random() < 0.5) {
        const b = rnd(2, 9), c = rnd(2, 9), a = rnd(1, 20);
        return { text: `${a} + ${b} \u00D7 ${c} = ?`, answer: a + b * c, a, b, op: 'order' };
      }
      const a = rnd(2, 9), b = rnd(2, 9), c = rnd(1, 20);
      return { text: `${a} \u00D7 ${b} + ${c} = ?`, answer: a * b + c, a, b, op: 'order' };
    },
    'decimals': () => {
      const a = rnd(1, 99) / 10, b = rnd(1, 99) / 10;
      if (Math.random() < 0.5) {
        return { text: `${a.toFixed(1)} + ${b.toFixed(1)} = ?`, answer: Math.round((a + b) * 10) / 10, a, b, op: '+d' };
      }
      const big = Math.max(a, b), small = Math.min(a, b);
      return { text: `${big.toFixed(1)} \u2212 ${small.toFixed(1)} = ?`, answer: Math.round((big - small) * 10) / 10, a: big, b: small, op: '\u2212d' };
    },
    'percentages': () => {
      const pct = [10, 20, 25, 50, 75][rnd(0, 4)];
      const whole = rnd(2, 20) * (100 / pct);
      return { text: `${pct}% of ${whole} = ?`, answer: (pct / 100) * whole, a: pct, b: whole, op: '%' };
    },
    // === Level 6 (NEW) ===
    'multi-step': () => {
      const a = rnd(2, 9), b = rnd(2, 9), c = rnd(2, 9), d = rnd(1, 15);
      const answer = a * b + c * d;
      return { text: `${a}\u00D7${b} + ${c}\u00D7${d} = ?`, answer, a, b, op: 'multi' };
    },
    'sqrt': () => {
      const vals = [4,9,16,25,36,49,64,81,100,121,144,169,196,225];
      const n = vals[rnd(0, vals.length - 1)];
      return { text: `\u221A${n} = ?`, answer: Math.sqrt(n), a: n, b: 0, op: '\u221A' };
    },
    'neg-multiply': () => {
      const a = rnd(2, 12), b = rnd(2, 12);
      const neg = Math.random() < 0.5;
      if (neg) return { text: `-${a} \u00D7 ${b} = ?`, answer: -a * b, a: -a, b, op: '\u00D7' };
      return { text: `${a} \u00D7 -${b} = ?`, answer: a * -b, a, b: -b, op: '\u00D7' };
    },
    // === Level 7 (NEW) ===
    'decimal-mul': () => {
      const a = rnd(1, 99) / 10, b = rnd(2, 9);
      const answer = Math.round(a * b * 10) / 10;
      return { text: `${a.toFixed(1)} \u00D7 ${b} = ?`, answer, a, b, op: '\u00D7d' };
    },
    'frac-add': () => {
      // fractions with common denominators: a/d + b/d
      const d = [2,3,4,5,6,8,10][rnd(0, 6)];
      const a = rnd(1, d - 1), b = rnd(1, d - 1);
      const sum = a + b;
      const answer = Math.round((sum / d) * 100) / 100;
      return { text: `${a}/${d} + ${b}/${d} = ? (decimal)`, answer, a, b, op: 'frac+' };
    },
    'pow10': () => {
      const a = rnd(1, 99) / 10;
      const mul = [10, 100, 1000][rnd(0, 2)];
      const answer = a * mul;
      return { text: `${a.toFixed(1)} \u00D7 ${mul} = ?`, answer, a, b: mul, op: '\u00D710' };
    },
    // === Level 8 (NEW) ===
    'gcd': () => {
      const primes = [2,3,5,7];
      const g = primes[rnd(0, 3)] * rnd(1, 3);
      const a = g * rnd(2, 6), b = g * rnd(2, 6);
      // Euclidean GCD
      function gcd(x, y) { while (y) { [x, y] = [y, x % y]; } return x; }
      const answer = gcd(a, b);
      return { text: `GCD(${a}, ${b}) = ?`, answer, a, b, op: 'gcd' };
    },
    'lcm': () => {
      const a = rnd(2, 12), b = rnd(2, 12);
      function gcd(x, y) { while (y) { [x, y] = [y, x % y]; } return x; }
      const answer = (a * b) / gcd(a, b);
      return { text: `LCM(${a}, ${b}) = ?`, answer, a, b, op: 'lcm' };
    },
    'algebra': () => {
      // ax + b = c, solve for x
      const x = rnd(1, 15);
      const a = rnd(2, 9);
      const b = rnd(1, 20);
      const c = a * x + b;
      return { text: `${a}x + ${b} = ${c}, x = ?`, answer: x, a: c, b: a, op: 'algebra' };
    },
    // === Level 9 (NEW) ===
    'unit-convert': () => {
      const conversions = [
        { q: (v) => `${v} km = ? m`, mul: 1000, unit: 'km\u2192m' },
        { q: (v) => `${v} m = ? cm`, mul: 100, unit: 'm\u2192cm' },
        { q: (v) => `${v} kg = ? g`, mul: 1000, unit: 'kg\u2192g' },
        { q: (v) => `${v} L = ? mL`, mul: 1000, unit: 'L\u2192mL' },
        { q: (v) => `${v} hr = ? min`, mul: 60, unit: 'hr\u2192min' },
        { q: (v) => `${v} min = ? sec`, mul: 60, unit: 'min\u2192sec' },
      ];
      const c = conversions[rnd(0, conversions.length - 1)];
      const v = rnd(1, 20);
      return { text: c.q(v), answer: v * c.mul, a: v, b: c.mul, op: 'unit' };
    },
    'ratio': () => {
      const a = rnd(2, 10), b = rnd(2, 10), mul = rnd(2, 5);
      return { text: `${a}:${b} = ${a * mul}:?`, answer: b * mul, a, b, op: 'ratio' };
    },
    'algebra2': () => {
      // ax - b = c, solve for x
      const x = rnd(2, 15);
      const a = rnd(2, 9);
      const b = rnd(1, a * x - 1);
      const c = a * x - b;
      return { text: `${a}x \u2212 ${b} = ${c}, x = ?`, answer: x, a: c, b: a, op: 'algebra' };
    },
    // === Level 10 (NEW — hardest) ===
    'multi-step-hard': () => {
      const a = rnd(2, 12), b = rnd(2, 12), c = rnd(2, 9), d = rnd(2, 9);
      const answer = a * b - c * d;
      return { text: `${a}\u00D7${b} \u2212 ${c}\u00D7${d} = ?`, answer, a, b, op: 'multi' };
    },
    'algebra3': () => {
      // (ax + b) / c = d, solve for x
      const x = rnd(1, 10);
      const a = rnd(2, 5);
      const c = rnd(2, 5);
      const b = rnd(1, 10);
      const d = (a * x + b) / c;
      if (d !== Math.floor(d)) return TOPIC_GENERATORS['algebra']();
      return { text: `(${a}x + ${b}) \u00F7 ${c} = ${d}, x = ?`, answer: x, a: d, b: a, op: 'algebra' };
    },
    'neg-ops': () => {
      const a = rnd(-20, 20), b = rnd(-20, 20);
      if (Math.random() < 0.5) {
        return { text: `(${a}) + (${b}) = ?`, answer: a + b, a, b, op: '+neg' };
      }
      return { text: `(${a}) \u00D7 (${b}) = ?`, answer: a * b, a, b, op: '\u00D7neg' };
    },
    'frac-add-diff': () => {
      // Add fractions with different denominators: a/b + c/d
      const denoms = [2,3,4,5,6,8,10,12,15,20];
      const d1 = denoms[rnd(0, denoms.length - 1)];
      const d2 = denoms.filter(d => d !== d1)[rnd(0, denoms.length - 2)];
      const n1 = rnd(1, d1 - 1), n2 = rnd(1, d2 - 1);
      const answer = Math.round((n1 / d1 + n2 / d2) * 1000) / 1000;
      return { text: `${n1}/${d1} + ${n2}/${d2} = ? (decimal)`, answer, a: n1, b: n2, op: 'frac+d' };
    },
    'simplify': () => {
      // Simplify: a(bx + c) + d(ex + f)
      const a = rnd(1, 5), b = rnd(1, 4), c = rnd(1, 9);
      const d = rnd(-5, -1), e = rnd(1, 4), f = rnd(-9, 9);
      const xCoeff = a * b + d * e;
      const constant = a * c + d * f;
      const dStr = d < 0 ? `\u2212 ${-d}` : `+ ${d}`;
      const fStr = f >= 0 ? `+ ${f}` : `\u2212 ${-f}`;
      const text = `${a}(${b}x + ${c}) ${dStr}(${e}x ${fStr}) = ?x + ?`;
      // Answer is the x coefficient (we ask for just that)
      return { text: `${a}(${b}x+${c}) ${dStr}(${e}x${f >= 0 ? '+' : ''}${f})\nx coefficient = ?`, answer: xCoeff, a: xCoeff, b: constant, op: 'simplify' };
    },
    'area-rect': () => {
      const w = rnd(2, 20), h = rnd(2, 20);
      if (Math.random() < 0.5) {
        return { text: `Rectangle ${w}\u00D7${h}\nArea = ?`, answer: w * h, a: w, b: h, op: 'area' };
      }
      return { text: `Rectangle ${w}\u00D7${h}\nPerimeter = ?`, answer: 2 * (w + h), a: w, b: h, op: 'perim' };
    },
    'area-triangle': () => {
      const b = rnd(2, 20) * 2, h = rnd(2, 15); // even base for clean area
      return { text: `Triangle base=${b} height=${h}\nArea = ?`, answer: (b * h) / 2, a: b, b: h, op: 'area' };
    },
    'area-circle': () => {
      const r = rnd(1, 10);
      const answer = Math.round(3.14 * r * r * 100) / 100;
      return { text: `Circle r=${r}\nArea = ? (\u03C0\u22483.14)`, answer, a: r, b: 0, op: 'area' };
    },
    'composite-shape': () => {
      const shapes = [
        // Square with square hole
        () => {
          const outer = rnd(6, 12), inner = rnd(2, outer - 2);
          const area = outer * outer - inner * inner;
          const svg = `<rect x="10" y="10" width="80" height="80" fill="#45b7d1" stroke="#fff" stroke-width="2"/>` +
            `<rect x="${10 + (80 - inner * 80 / outer) / 2}" y="${10 + (80 - inner * 80 / outer) / 2}" width="${inner * 80 / outer}" height="${inner * 80 / outer}" fill="#2b2d42" stroke="#fff" stroke-width="1.5"/>` +
            `<text x="50" y="103" fill="#fff" font-size="9" text-anchor="middle">${outer}</text>` +
            `<text x="50" y="55" fill="#fff" font-size="8" text-anchor="middle">${inner}</text>`;
          return { svg, text: 'Shaded area = ?', answer: area };
        },
        // Rectangle + triangle on top (house shape)
        () => {
          const w = rnd(4, 10), h = rnd(3, 8), th = rnd(2, 5);
          const area = w * h + (w * th) / 2;
          const svg = `<rect x="15" y="50" width="70" height="45" fill="#96ceb4" stroke="#fff" stroke-width="2"/>` +
            `<polygon points="15,50 50,${50 - th * 9} 85,50" fill="#ff6b6b" stroke="#fff" stroke-width="2"/>` +
            `<text x="50" y="103" fill="#fff" font-size="9" text-anchor="middle">${w}</text>` +
            `<text x="7" y="75" fill="#fff" font-size="8" text-anchor="middle">${h}</text>` +
            `<text x="50" y="${48 - th * 5}" fill="#fff" font-size="8" text-anchor="middle">${th}</text>`;
          return { svg, text: 'Total area = ?', answer: area };
        },
        // L-shape (two rectangles)
        () => {
          const w1 = rnd(3, 6), h1 = rnd(5, 9), w2 = rnd(3, 6), h2 = rnd(3, 5);
          const area = w1 * h1 + w2 * h2;
          const svg = `<rect x="10" y="10" width="35" height="80" fill="#a78bfa" stroke="#fff" stroke-width="2"/>` +
            `<rect x="45" y="50" width="40" height="40" fill="#a78bfa" stroke="#fff" stroke-width="2"/>` +
            `<text x="28" y="103" fill="#fff" font-size="8" text-anchor="middle">${w1}</text>` +
            `<text x="5" y="55" fill="#fff" font-size="8" text-anchor="middle">${h1}</text>` +
            `<text x="65" y="47" fill="#fff" font-size="8" text-anchor="middle">${w2}</text>` +
            `<text x="90" y="75" fill="#fff" font-size="8" text-anchor="middle">${h2}</text>`;
          return { svg, text: 'Total area = ?', answer: area };
        },
      ];
      const shape = shapes[rnd(0, shapes.length - 1)]();
      return {
        type: 'shape', // uses SVG display + numpad
        text: shape.text,
        svg: shape.svg,
        answer: shape.answer,
        a: shape.answer, b: 0, op: 'comp-area',
        useNumpad: true,
      };
    },
    'mixed': () => {
      const keys = Object.keys(TOPIC_GENERATORS).filter(k => k !== 'mixed' && !k.startsWith('shapes'));
      return TOPIC_GENERATORS[keys[rnd(0, keys.length - 1)]]();
    },
  };

  function pickRandom(arr) { return arr[rnd(0, arr.length - 1)]; }
  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

  const WORD_GENERATORS = {
    'rhyming': () => {
      const group = pickRandom(RHYME_PAIRS);
      const target = pickRandom(group);
      const correct = pickRandom(group.filter(w => w !== target));
      // 3 wrong answers from other groups
      const wrongPool = RHYME_PAIRS.filter(g => g !== group).map(g => pickRandom(g));
      const wrong = shuffle(wrongPool).slice(0, 3);
      const choices = shuffle([correct, ...wrong]);
      return { type: 'word', text: `What rhymes with "${target.toUpperCase()}"?`, answer: correct, choices, a: target, b: correct, op: 'rhyme' };
    },
    'antonyms': () => {
      const pair = pickRandom(ANTONYM_PAIRS);
      const flip = Math.random() < 0.5;
      const word = flip ? pair[0] : pair[1];
      const correct = flip ? pair[1] : pair[0];
      const wrongPool = ANTONYM_PAIRS.filter(p => p !== pair).map(p => pickRandom(p));
      const wrong = shuffle(wrongPool).slice(0, 3);
      const choices = shuffle([correct, ...wrong]);
      return { type: 'word', text: `Opposite of "${word.toUpperCase()}"?`, answer: correct, choices, a: word, b: correct, op: 'antonym' };
    },
    'synonyms': () => {
      const pair = pickRandom(SYNONYM_PAIRS);
      const flip = Math.random() < 0.5;
      const word = flip ? pair[0] : pair[1];
      const correct = flip ? pair[1] : pair[0];
      const wrongPool = SYNONYM_PAIRS.filter(p => p !== pair).map(p => pickRandom(p));
      const wrong = shuffle(wrongPool).slice(0, 3);
      const choices = shuffle([correct, ...wrong]);
      return { type: 'word', text: `Same as "${word.toUpperCase()}"?`, answer: correct, choices, a: word, b: correct, op: 'synonym' };
    },
    'missing-letter': () => {
      const level = state.grade;
      const pool = level <= 3 ? MISSING_LETTER_WORDS.slice(0, 10) :
                   level <= 5 ? MISSING_LETTER_WORDS.slice(0, 20) :
                   MISSING_LETTER_WORDS;
      const word = pickRandom(pool);
      const idx = rnd(0, word.length - 1);
      const missing = word[idx];
      const display = word.slice(0, idx) + ' _ ' + word.slice(idx + 1);
      // Wrong letters
      const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('').filter(c => c !== missing);
      const wrong = shuffle(alphabet).slice(0, 3);
      const choices = shuffle([missing, ...wrong]);
      return { type: 'word', text: display.toUpperCase(), answer: missing, choices: choices.map(c => c.toUpperCase()), a: word, b: missing, op: 'missing' };
    },
    'spelling': () => {
      const level = state.grade;
      const pool = level <= 3 ? MISSING_LETTER_WORDS.slice(0, 10) :
                   level <= 5 ? MISSING_LETTER_WORDS.slice(0, 20) :
                   MISSING_LETTER_WORDS;
      const correct = pickRandom(pool);
      // Generate misspellings
      function misspell(w) {
        const i = rnd(0, w.length - 1);
        const c = 'abcdefghijklmnopqrstuvwxyz'[rnd(0, 25)];
        return w.slice(0, i) + c + w.slice(i + 1);
      }
      const wrongSet = new Set();
      while (wrongSet.size < 3) {
        const m = misspell(correct);
        if (m !== correct) wrongSet.add(m);
      }
      const choices = shuffle([correct, ...wrongSet].map(w => w.toUpperCase()));
      return { type: 'word', text: 'Which spelling is correct?', answer: correct.toUpperCase(), choices, a: correct, b: '', op: 'spelling' };
    },
    'scramble': () => {
      const level = state.grade;
      const pool = level <= 3 ? SCRAMBLE_WORDS.slice(0, 10) :
                   level <= 5 ? SCRAMBLE_WORDS.slice(0, 20) :
                   SCRAMBLE_WORDS;
      const correct = pickRandom(pool);
      // Scramble the word
      let scrambled = correct;
      let tries = 0;
      while ((scrambled === correct || scrambled === correct.split('').reverse().join('')) && tries < 20) {
        scrambled = shuffle(correct.split('')).join('');
        tries++;
      }
      // Pick 3 wrong words from pool
      const wrong = shuffle(pool.filter(w => w !== correct)).slice(0, 3);
      const choices = shuffle([correct, ...wrong].map(w => w.toUpperCase()));
      return { type: 'word', text: `Unscramble: "${scrambled.toUpperCase()}"`, answer: correct.toUpperCase(), choices, a: scrambled, b: correct, op: 'scramble' };
    },
    'vocabulary': () => {
      const item = pickRandom(VOCAB_WORDS);
      const choices = shuffle([item.meaning, ...item.wrong]);
      return { type: 'word', text: `What does "${item.word.toUpperCase()}" mean?`, answer: item.meaning, choices, a: item.word, b: item.meaning, op: 'vocab' };
    },
    'sight-words': () => {
      const level = state.grade;
      const pool = level <= 3 ? SIGHT_WORDS.easy : [...SIGHT_WORDS.easy, ...SIGHT_WORDS.hard];
      const correct = pickRandom(pool);
      // Show word briefly then ask to pick it — simplified: show scrambled, pick correct
      const wrong = shuffle(pool.filter(w => w !== correct)).slice(0, 3);
      const choices = shuffle([correct, ...wrong].map(w => w.toUpperCase()));
      // Show the word with one letter changed, ask which is the real word
      return { type: 'word', text: `Find the word: "${correct.toUpperCase()}"`, answer: correct.toUpperCase(), choices, a: correct, b: '', op: 'sight' };
    },
  };

  function getSelectedPlayer() {
    const sel = $('player-select').value;

    return sel;

  function populatePlayerSelect() {
    const players = getPlayers();
    const sel = $('player-select');
    const prev = sel.value;
    sel.innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join('') +
      '<option value="__new__">+ New Player</option>';
    // Restore previous selection or last player
    if (prev && players.includes(prev)) sel.value = prev;
    else if (saved.lastPlayer && players.includes(saved.lastPlayer)) sel.value = saved.lastPlayer;
    else if (players.length > 0) sel.value = players[0];
    else sel.value = '__new__';
    toggleNewPlayerInput();
  }

  function toggleNewPlayerInput() {
    const isNew = $('player-select').value === '__new__';
    $('new-player-wrap').classList.toggle('hidden', !isNew);
    $('new-player-level-wrap').classList.toggle('hidden', !isNew);
  }

  function updateLevelOptions() {
    const cat = $('category-select').value;
    const player = getSelectedPlayer();
    const unlocked = getPlayerMaxLevel(player, cat);
    const sel = $('difficulty-select');
    const prevVal = parseInt(sel.value, 10) || 1;
    sel.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      if (i <= unlocked) {
        sel.innerHTML += `<option value="${i}">Level ${i}</option>`;
      } else {
        sel.innerHTML += `<option value="${i}" disabled>Level ${i} \uD83D\uDD12</option>`;
      }
    }
    // Restore selection if still unlocked, otherwise pick highest unlocked
    sel.value = Math.min(prevVal, unlocked);
    updateTopicSelect();
  }

  function updateTopicSelect() {
    const cat = $('category-select').value;
    const level = parseInt($('difficulty-select').value, 10);
    const player = getSelectedPlayer();
    const topicMap = cat === 'words' ? WORD_TOPICS : GRADE_TOPICS;
    const topics = topicMap[level] || topicMap[1];
    const passed = getPassedTopics(player, cat, level);
    const sel = $('mode-select');
    sel.innerHTML = topics.map((t, i) => {
      const check = passed.includes(t.value) ? '\u2705 ' : '';
      return `<option value="${t.value}"${i === 0 ? ' selected' : ''}>${check}${t.label}</option>`;
    }).join('');
  }

  function generateShapeQuestion() {
    const pool = state.mode === 'shapes-3d' ? SHAPES_3D :
                 state.mode === 'shapes-all' ? SHAPES_ALL : SHAPES_2D;
    const allNames = pool.map(s => s.name);
    const idx = Math.floor(Math.random() * pool.length);
    const correct = pool[idx];
    // Pick 3 wrong answers
    const others = allNames.filter(n => n !== correct.name);
    const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
    const choices = [...shuffled, correct.name].sort(() => Math.random() - 0.5);
    return {
      type: 'shape',
      text: 'What shape is this?',
      svg: correct.svg,
      answer: correct.name,
      choices,
      a: correct.name, b: '', op: 'shape',
    };
  }

  function generateAnyQuestion() {
    if (state.mode === 'shapes' || state.mode === 'shapes-3d' || state.mode === 'shapes-all') {
      return generateShapeQuestion();
    }
    const q = generateQuestion();
    // Word generators already return type:'word' with choices
    return q;
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    return m + ':' + String(s % 60).padStart(2, '0');
  }

  function updateTimerBar() {
    const pct = (state.totalRemaining / state.totalTime) * 100;
    const bar = $('timer-bar');
    bar.style.width = pct + '%';
    if (pct > 50) bar.style.backgroundColor = '#27ae60';
    else if (pct > 20) bar.style.backgroundColor = '#f39c12';
    else bar.style.backgroundColor = '#e74c3c';
    $('total-time-display').textContent = formatTime(Math.max(0, state.totalRemaining));
  }

    $('score-display').textContent = '\u2728 ' + state.stars;

  function updateComboDisplay() {
    const el = $('combo-display');
    if (state.combo < 2) { el.textContent = ''; return; }
    el.textContent = state.combo + 'x Combo!';
    el.classList.remove('combo-fire', 'combo-super', 'combo-ultra');
    if (state.combo >= 15) el.classList.add('combo-ultra');
    else if (state.combo >= 10) el.classList.add('combo-super');
    else if (state.combo >= 5) el.classList.add('combo-fire');
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    if (state.combo >= 5) playSound('combo');
  }

      if (state.totalRemaining <= 0) endGame();

    state.questionRemaining = state.questionTime;
    $('question-timer-display').textContent = state.questionRemaining + 's';
    state.questionInterval = setInterval(() => {

    if (state.gameOver) return;
    $('correct-answer-display').textContent = '';
    state.questionCount++;
    setCharacter(state.charIdle, 'wave');

    const q = generateAnyQuestion();
    state.currentAnswer = q.answer;
    state.currentQuestion = q;
    state.questionType = q.type || 'math';

    if (state.questionType === 'shape' && q.useNumpad) {
      // Shape with diagram + numpad (composite shapes)
      $('question-display').textContent = q.text;
      $('shape-display').innerHTML = '<svg viewBox="0 0 100 110" width="120" height="130">' + q.svg + '</svg>';
      $('shape-display').classList.remove('hidden');
      $('answer-display').classList.remove('hidden');
      $('numpad').classList.remove('hidden');
      $('choices').classList.add('hidden');
      $('answer-input').value = '';
      updateAnswerDisplay();
    } else if (state.questionType === 'shape') {
      // Shape with choices
      $('question-display').textContent = q.text;
      $('shape-display').innerHTML = '<svg viewBox="0 0 120 110" width="120" height="110">' + q.svg + '</svg>';

      $('answer-display').classList.add('hidden');

      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => submitChoice(btn.dataset.choice), { once: true });

      // Word question with choices
      $('question-display').textContent = q.text;
      $('shape-display').classList.add('hidden');
      $('answer-display').classList.add('hidden');
      $('numpad').classList.add('hidden');
      $('choices').innerHTML = q.choices.map(c =>
        `<button type="button" class="choice-btn" data-choice="${c}">${c}</button>`
      ).join('');
      $('choices').classList.remove('hidden');
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', () => submitChoice(btn.dataset.choice), { once: true });
      });
    } else {
      // Math question — show numpad, hide choices
      $('question-display').textContent = q.text;
      $('shape-display').classList.add('hidden');
      $('answer-display').classList.remove('hidden');
      $('numpad').classList.remove('hidden');
      $('choices').classList.add('hidden');
      $('answer-input').value = '';
      updateAnswerDisplay();
    }

    state.isAcceptingInput = true;
    clearInterval(state.questionInterval);
    startQuestionTimer();
  }

  function submitAnswer() {
    if (!state.isAcceptingInput || state.gameOver) return;
    state.isAcceptingInput = false;
    clearInterval(state.questionInterval);
    const raw = $('answer-input').value;
    const val = raw.includes('.') ? parseFloat(raw) : parseInt(raw, 10);
    const q = state.currentQuestion;
    if (!isNaN(val) && Math.abs(val - state.currentAnswer) < 0.001) {
      state.correct++;
      state.combo++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      // Stars: 1 base + bonus for combos
      let earned = 1;
      if (state.combo >= 10) earned = 3;
      else if (state.combo >= 5) earned = 2;
      state.stars += earned;
      state.history.push({ ...q, result: 'correct' });
      updateComboDisplay();
      updateScoreDisplay();
      playSound('correct');
      setCharacter(state.charHappy, 'bounce');
      checkLiveBadges();
      showFeedback('correct');
    } else {
      state.incorrect++;
      state.combo = 0;
      state.history.push({ ...q, result: 'incorrect', given: val });
      updateComboDisplay();
      playSound('incorrect');
      $('correct-answer-display').textContent = 'Answer: ' + state.currentAnswer;
      setCharacter(state.charSad, 'shake');
      checkLiveBadges();
      showFeedback('incorrect');
    }
  }

  function submitChoice(chosen) {
    if (!state.isAcceptingInput || state.gameOver) return;
    state.isAcceptingInput = false;
    clearInterval(state.questionInterval);
    const q = state.currentQuestion;

    // Highlight correct/wrong on buttons
    document.querySelectorAll('.choice-btn').forEach(btn => {
      if (btn.dataset.choice === state.currentAnswer) btn.classList.add('correct-choice');
      if (btn.dataset.choice === chosen && chosen !== state.currentAnswer) btn.classList.add('wrong-choice');
    });

    if (chosen === state.currentAnswer) {
      state.correct++;
      state.combo++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      let earned = 1;
      if (state.combo >= 10) earned = 3;
      else if (state.combo >= 5) earned = 2;
      state.stars += earned;
      state.history.push({ ...q, result: 'correct' });
      updateComboDisplay();
      updateScoreDisplay();
      playSound('correct');
      setCharacter(state.charHappy, 'bounce');
      checkLiveBadges();
      showFeedback('correct');
    } else {
      state.incorrect++;
      state.combo = 0;
      state.history.push({ ...q, result: 'incorrect', given: chosen });
      updateComboDisplay();
      playSound('incorrect');
      $('correct-answer-display').textContent = 'Answer: ' + state.currentAnswer;
      setCharacter(state.charSad, 'shake');
      checkLiveBadges();
      showFeedback('incorrect');
    }
  }

  function handleTimeout() {
    if (!state.isAcceptingInput || state.gameOver) return;
    state.isAcceptingInput = false;
    clearInterval(state.questionInterval);

    // Check if the current input already has the right answer
    const raw = $('answer-input').value;
    const val = raw.includes('.') ? parseFloat(raw) : parseInt(raw, 10);
    if (!isNaN(val) && Math.abs(val - state.currentAnswer) < 0.001) {
      // Correct answer was entered, just not submitted in time — count as correct
      state.correct++;
      state.combo++;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      let earned = 1;
      if (state.combo >= 10) earned = 3;
      else if (state.combo >= 5) earned = 2;
      state.stars += earned;
      state.history.push({ ...state.currentQuestion, result: 'correct' });
      updateComboDisplay();
      updateScoreDisplay();
      playSound('correct');
      setCharacter(state.charHappy, 'bounce');
      checkLiveBadges();
      showFeedback('correct');
      return;
    }

    state.incorrect++;
    state.combo = 0;
    state.history.push({ ...state.currentQuestion, result: 'timeout' });
    updateComboDisplay();
    $('correct-answer-display').textContent = 'Answer: ' + state.currentAnswer;
    // Highlight correct choice if shape or word question
    if (state.questionType === 'shape' || state.questionType === 'word') {
      document.querySelectorAll('.choice-btn').forEach(btn => {
        if (btn.dataset.choice === state.currentAnswer) btn.classList.add('correct-choice');
      });
    }
    playSound('timeout');
    setCharacter(state.charSad, 'shake');
    showFeedback('incorrect');
  }

  function showFeedback(type) {
    const overlay = $('feedback-overlay');
    overlay.classList.remove('feedback-correct', 'feedback-incorrect');
    void overlay.offsetWidth;
    overlay.classList.add(type === 'correct' ? 'feedback-correct' : 'feedback-incorrect');
    overlay.addEventListener('animationend', () => {
      overlay.classList.remove('feedback-correct', 'feedback-incorrect');
      nextQuestion();
    }, { once: true });
  }

  // Trophies
  function calcTrophies() {
    const total = state.correct + state.incorrect;
    const pct = total > 0 ? Math.round((state.correct / total) * 100) : 0;
    const trophies = [
      { id: 'perfect',   icon: '&#128081;', label: 'Perfect',      earned: pct === 100 && total >= 5 },  // 👑 Crown
      { id: 'streak10',  icon: '&#128142;', label: '10x Combo',    earned: state.maxCombo >= 10 },       // 💎 Gem
      { id: 'streak20',  icon: '&#127800;', label: '20x Combo',    earned: state.maxCombo >= 20 },       // 🌸 Blossom
      { id: 'speed',     icon: '&#127856;', label: '30+ Answers',  earned: total >= 30 },                // 🍰 Cake
      { id: 'stars50',   icon: '&#128141;', label: '50 Stars',     earned: state.stars >= 50 },          // 💍 Ring
      { id: 'fast',      icon: '&#128171;', label: '90%+ Score',   earned: pct >= 90 && total >= 10 },   // 💫 Dizzy star
    ];
    return trophies;
  }

  // Live badge tracking
  let earnedBadgeIds = new Set();

  function initLiveBadges() {
    earnedBadgeIds = new Set();
    const trophies = calcTrophies();
    $('live-badges').innerHTML = trophies.map(t =>
      `<div class="live-badge" data-badge="${t.id}" title="${t.label}">${t.icon}</div>`
    ).join('');
  }

  function spawnConfetti() {
    const colors = ['#f5af19','#ee4444','#44bbee','#44dd66','#ff69b4','#ffd700','#da70d6','#ff6347'];
    const shapes = ['circle','square','ribbon'];
    const count = 50;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const size = 6 + Math.random() * 8;
      el.style.backgroundColor = color;
      el.style.width = (shape === 'ribbon' ? size * 0.4 : size) + 'px';
      el.style.height = (shape === 'ribbon' ? size * 2.5 : size) + 'px';
      el.style.borderRadius = shape === 'circle' ? '50%' : (shape === 'ribbon' ? '2px' : '1px');
      el.style.left = (5 + Math.random() * 90) + 'vw';
      el.style.top = (-5 - Math.random() * 10) + 'vh';
      el.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
      el.style.setProperty('--fall-duration', (1.5 + Math.random() * 1.5) + 's');
      el.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  function showBadgeCelebration(label, icon) {
    // Golden glow
    const glow = document.createElement('div');
    glow.className = 'badge-glow';
    document.body.appendChild(glow);
    glow.addEventListener('animationend', () => glow.remove());

    // Badge name popup
    const popup = document.createElement('div');
    popup.className = 'badge-name-popup';
    popup.innerHTML = icon + ' ' + label + '!';
    document.body.appendChild(popup);
    popup.addEventListener('animationend', () => popup.remove());

    // Confetti
    spawnConfetti();
  }

  function checkLiveBadges() {
    const trophies = calcTrophies();
    trophies.forEach(t => {
      const el = document.querySelector(`.live-badge[data-badge="${t.id}"]`);
      if (!el) return;
      if (t.earned && !earnedBadgeIds.has(t.id)) {
        earnedBadgeIds.add(t.id);
        el.classList.add('earned');
        playSound('badge');
        showBadgeCelebration(t.label, t.icon);
      }
    });
  }


  function endGame() {
    state.gameOver = true;
    clearInterval(state.totalInterval);
    clearInterval(state.questionInterval);
    stopBgm();
    saved.gamesPlayed++;
    const total = state.correct + state.incorrect;
    const pct = total > 0 ? Math.round((state.correct / total) * 100) : 0;

    // Best score
    const key = 'g' + state.grade + '-' + state.mode;
    const prevBest = saved.bestScore[key] || 0;
    const isNewBest = state.correct > prevBest;
    if (isNewBest) saved.bestScore[key] = state.correct;

    // Save game to history
    const missedQuestions = state.history.filter(h => h.result !== 'correct').map(h => ({
      q: `${h.a} ${h.op} ${h.b}`, result: h.result
    }));
    saved.gameHistory.push({
      player: state.playerName || 'Anonymous',
      date: new Date().toISOString(),
      category: state.category || 'math',
      level: state.grade,
      topic: state.mode,
      correct: state.correct,
      incorrect: state.incorrect,
      pct,
      combo: state.maxCombo,
      stars: state.stars,
      missed: missedQuestions,
    });
    // Keep last 100 games
    if (saved.gameHistory.length > 100) saved.gameHistory = saved.gameHistory.slice(-100);

    // Level-up check
    let leveledUp = false;
    let topicPassed = false;
    const cat = state.category || 'math';
    const currentMax = getPlayerMaxLevel(state.playerName, cat);
    const baseThreshold = parseInt($('threshold-input').value, 10) || PASS_THRESHOLD;
    const threshold = cat === 'words' ? Math.max(baseThreshold - 20, 50) : baseThreshold;
    const minQuestions = Math.ceil((state.totalTime / state.questionTime) * 1.5);
    // Mark this topic as passed if threshold met
    if (pct >= threshold && total >= minQuestions) {
      markTopicPassed(state.playerName, cat, state.grade, state.mode);
      topicPassed = true;
      // Unlock next level only if ALL topics at current level are passed
      if (state.grade === currentMax && state.grade < 10 && allTopicsPassed(state.playerName, cat, state.grade)) {
        setPlayerMaxLevel(state.playerName, cat, currentMax + 1);
        leveledUp = true;
      }
    }

    persist();

    // Stats
    const levelUpHtml = leveledUp
      ? `<div class="level-up-msg">Level ${state.grade + 1} Unlocked!</div>` : '';
    const topicPassHtml = topicPassed && !leveledUp
      ? `<div style="color:#27ae60;font-size:0.85rem;font-weight:600;margin:2px 0;">Topic Passed!</div>` : '';
    // Show progress: how many topics passed at this level
    const topicMap = cat === 'words' ? WORD_TOPICS : GRADE_TOPICS;
    const allTopics = topicMap[state.grade] || [];
    const passedTopics = getPassedTopics(state.playerName, cat, state.grade);
    const progressHtml = state.grade === currentMax && !leveledUp
      ? `<div style="font-size:0.75rem;color:rgba(255,255,255,0.4);margin-top:2px;">Topics: ${passedTopics.length}/${allTopics.length} passed</div>` : '';
    $('results-stats').innerHTML =
      `<div class="big">${pct}%</div>` +
      (isNewBest ? '<div><span class="new-best">NEW BEST!</span></div>' : '') +
      levelUpHtml + topicPassHtml + progressHtml +
      `Total: ${total} &middot; Correct: ${state.correct} &middot; Stars: \u2728${state.stars}<br>` +
      `Best Combo: ${state.maxCombo}x`;

    // Trophies — only show earned this session
    const trophies = calcTrophies();
    const earnedTrophies = trophies.filter(t => t.earned);
    if (earnedTrophies.length > 0) {
      $('trophies').innerHTML = '<div style="font-size:0.8rem;color:rgba(255,255,255,0.5);margin-bottom:4px;">Badges Earned</div>' +
        earnedTrophies.map(t =>
          `<div class="trophy earned"><span class="icon">${t.icon}</span>${t.label}</div>`
        ).join('');
    } else {
      $('trophies').innerHTML = '';
    }

    // Weakness
    const missed = {};
    state.history.forEach(h => {
      if (h.result !== 'correct') {
        const k = `${h.a} ${h.op} ${h.b}`;
        missed[k] = (missed[k] || 0) + 1;
      }
    });
    const sorted = Object.entries(missed).sort((a, b) => b[1] - a[1]);
    const maxMiss = sorted.length > 0 ? sorted[0][1] : 1;
    const section = $('weakness-section');
    if (sorted.length === 0) {
      section.innerHTML = '<h2>Weak Patterns</h2><div class="no-weakness">No mistakes!</div>';
    } else {
      section.innerHTML = '<h2>Weak Patterns</h2><ul class="weakness-list">' +
        sorted.slice(0, 6).map(([q, count]) => {
          const pctB = Math.round((count / maxMiss) * 100);
          return `<li class="weakness-item"><span class="question-text">${q}</span>` +
            `<div class="weakness-bar"><div class="weakness-bar-fill" style="width:${pctB}%"></div></div>` +
            `<span class="miss-count">${count}x</span></li>`;
        }).join('') + '</ul>';
    }

    if (leveledUp) {
      playSound('badge');
      spawnConfetti();
    } else {
      playSound('gameover');
    }
    showScreen('results-screen');
  }

  // Time scaling per level
  const LEVEL_TIMES = {
    1: { total: 60, perQ: 5 },
    2: { total: 60, perQ: 5 },
    3: { total: 60, perQ: 6 },
    4: { total: 75, perQ: 7 },
    5: { total: 75, perQ: 8 },
    6: { total: 90, perQ: 10 },
    7: { total: 90, perQ: 12 },
    8: { total: 120, perQ: 15 },
    9: { total: 120, perQ: 20 },
    10: { total: 150, perQ: 25 },
  };

  function startGame() {
    const level = parseInt($('difficulty-select').value, 10);
    const lt = LEVEL_TIMES[level] || { total: 60, perQ: 5 };
    // Use settings values if manually changed, otherwise use level defaults
    const settingsTotal = parseInt($('total-time-input').value, 10);
    const settingsPerQ = parseInt($('question-time-input').value, 10);
    state.totalTime = Math.max(10, settingsTotal || lt.total);
    state.questionTime = Math.max(1, settingsPerQ || lt.perQ);
    state.playerName = getSelectedPlayer();
    // Set starting level for new players
    if ($('player-select').value === '__new__' && state.playerName !== 'Anonymous') {
      const startLevel = parseInt($('new-player-level').value, 10) || 1;
      const cat = $('category-select').value;
      if (!saved.playerLevels[state.playerName]) {
        setPlayerMaxLevel(state.playerName, 'math', startLevel);
        setPlayerMaxLevel(state.playerName, 'words', startLevel);
      }
    }
    saved.lastPlayer = state.playerName;
    persist();
    state.category = $('category-select').value;
    state.grade = parseInt($('difficulty-select').value, 10);
    state.mode = $('mode-select').value;
    state.correct = 0; state.incorrect = 0; state.combo = 0; state.maxCombo = 0;
    state.stars = 0; state.history = []; state.questionCount = 0;
    state.gameOver = false; state.isAcceptingInput = true;
    $('combo-display').textContent = '';
    $('correct-answer-display').textContent = '';
    updateScoreDisplay();
    showScreen('quiz-screen');
    initLiveBadges();
    startBgm();
    startTotalTimer();
    nextQuestion();
  }

  // Show best score on start screen
  function showBestScore() {
    const keys = Object.keys(saved.bestScore);
    if (keys.length === 0) { $('best-score-display').classList.add('hidden'); return; }
    const parts = keys.map(k => `${k}: <span>${saved.bestScore[k]}</span>`);
    $('best-score-display').innerHTML = 'Best: ' + parts.join(' &middot; ');
    $('best-score-display').classList.remove('hidden');
  }

  // Init
  applyTheme(saved.theme);

  showBestScore();

  $('start-btn').addEventListener('click', () => {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startGame();
  });
  $('play-again-btn').addEventListener('click', () => {
    populatePlayerSelect();
    showBestScore();
    updateLevelOptions();
    showScreen('start-screen');
  });
  $('cancel-btn').addEventListener('click', () => {
    state.gameOver = true;
    clearInterval(state.totalInterval);
    clearInterval(state.questionInterval);
    stopBgm();
    populatePlayerSelect();
    showBestScore();
    updateLevelOptions();
    showScreen('start-screen');
  });

  // Dashboard
  function getPlayers() {
    const names = new Set(saved.gameHistory.map(g => g.player));
    return [...names].sort();
  }

  function renderDashboard(player) {
    const games = player === '__all__'
      ? saved.gameHistory
      : saved.gameHistory.filter(g => g.player === player);

    // Summary
    const totalGames = games.length;
    const totalCorrect = games.reduce((s, g) => s + g.correct, 0);
    const totalIncorrect = games.reduce((s, g) => s + g.incorrect, 0);
    const totalQ = totalCorrect + totalIncorrect;
    const avgPct = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;
    const totalStars = games.reduce((s, g) => s + (g.stars || 0), 0);

    $('dash-summary').innerHTML =
      `<div class="dash-stat"><div class="val">${totalGames}</div><div class="lbl">Games</div></div>` +
      `<div class="dash-stat"><div class="val">${avgPct}%</div><div class="lbl">Avg Accuracy</div></div>` +
      `<div class="dash-stat"><div class="val">${totalStars}</div><div class="lbl">Total Stars</div></div>`;

    // Accuracy trend chart (last 20)
    const recent = games.slice(-20);
    if (recent.length > 0) {
      $('dash-chart').innerHTML = recent.map(g => {
        const cls = g.pct >= 80 ? 'good' : g.pct >= 50 ? 'ok' : 'bad';
        return `<div class="dash-bar ${cls}" style="height:${Math.max(g.pct, 5)}%" title="${g.pct}%"></div>`;
      }).join('');
    } else {
      $('dash-chart').innerHTML = '<div class="dash-empty">No games yet</div>';
    }

    // Weak patterns across all games
    const missed = {};
    games.forEach(g => {
      (g.missed || []).forEach(m => {
        missed[m.q] = (missed[m.q] || 0) + 1;
      });
    });
    const sorted = Object.entries(missed).sort((a, b) => b[1] - a[1]).slice(0, 10);
    if (sorted.length > 0) {
      $('dash-weak').innerHTML = '<ul class="dash-weak-list">' + sorted.map(([q, cnt]) =>
        `<li class="dash-weak-item"><span class="q">${q}</span><span class="cnt">${cnt}x missed</span></li>`
      ).join('') + '</ul>';
    } else {
      $('dash-weak').innerHTML = '<div class="dash-empty">No mistakes recorded</div>';
    }

    // Recent games list
    if (games.length > 0) {
      $('dash-games').innerHTML = games.slice(-20).reverse().map(g => {
        const d = new Date(g.date);
        const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        const scoreClass = g.pct >= 80 ? 'high' : g.pct >= 50 ? 'mid' : 'low';
        const total = g.correct + g.incorrect;
        return `<li class="dash-game">
          <span class="date">${dateStr}</span>
          <span class="info">${g.player} &middot; L${g.level} ${g.topic}</span>
          <span class="score ${scoreClass}">${g.pct}% (${g.correct}/${total})</span>
        </li>`;
      }).join('');
    } else {
      $('dash-games').innerHTML = '<li class="dash-empty">No games yet</li>';
    }
  }

  $('dashboard-btn').addEventListener('click', () => {
    const players = getPlayers();
    const sel = $('dash-player-select');
    sel.innerHTML = '<option value="__all__">All Players</option>' +
      players.map(p => `<option value="${p}">${p}</option>`).join('');
    renderDashboard('__all__');
    showScreen('dashboard-screen');
  });

  $('dash-player-select').addEventListener('change', () => {
    renderDashboard($('dash-player-select').value);
  });

  $('dash-back-btn').addEventListener('click', () => {
    showScreen('start-screen');
  });

  // Settings screen
  $('settings-btn').addEventListener('click', () => showScreen('settings-screen'));
  $('settings-back-btn').addEventListener('click', () => showScreen('start-screen'));
  $('threshold-input').addEventListener('input', () => {
    $('threshold-display').textContent = $('threshold-input').value;
  });

  // Restore last player
  populatePlayerSelect();

  // Numpad
  document.querySelectorAll('.numpad-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (!state.isAcceptingInput || state.gameOver) return;
      const num = btn.dataset.num;
      const action = btn.dataset.action;
      if (num !== undefined) {
        const input = $('answer-input');
        if (input.value.length < 6) {
          input.value += num;
          updateAnswerDisplay();
        }
        // Float star on button position
        if (state.combo >= 3) {
          const rect = btn.getBoundingClientRect();
          floatStar(rect.left + rect.width / 2 - 10, rect.top);
        }
      } else if (action === 'dot') {
        const input = $('answer-input');
        if (!input.value.includes('.')) { input.value += '.'; updateAnswerDisplay(); }
      } else if (action === 'clear') {
        $('answer-input').value = '';
        updateAnswerDisplay();
      } else if (action === 'sign') {
        const input = $('answer-input');
        if (input.value.startsWith('-')) input.value = input.value.slice(1);
        else if (input.value.length > 0) input.value = '-' + input.value;
        else input.value = '-';
        updateAnswerDisplay();
      } else if (action === 'submit') {
        submitAnswer();
      }
    });
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if ($('quiz-screen').classList.contains('hidden')) return;
    if (!state.isAcceptingInput || state.gameOver) return;
    if (e.key >= '0' && e.key <= '9') {
      const input = $('answer-input');
      if (input.value.length < 6) { input.value += e.key; updateAnswerDisplay(); }
    } else if (e.key === '.') {
      const input = $('answer-input');
      if (!input.value.includes('.')) { input.value += '.'; updateAnswerDisplay(); }
    } else if (e.key === '-') {
      const input = $('answer-input');
      if (input.value.startsWith('-')) input.value = input.value.slice(1);
      else input.value = '-' + input.value;
      updateAnswerDisplay();
    } else if (e.key === 'Backspace') {
      const input = $('answer-input');
      input.value = input.value.slice(0, -1);
      updateAnswerDisplay();
    } else if (e.key === 'Enter') { submitAnswer(); }
  });
</script>
</body>
</html>
